<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Campo Minado Cooperativo</title>
</head>
<body>
    <h1>Campo Minado Cooperativo</h1>

    <div id="board" style="display: grid; grid-template-columns: repeat(5, 45px); gap: 5px;"></div>
    <div id="status">Aguardando conexão...</div>

    <script>
        const boardDiv = document.getElementById("board");
        const statusDiv = document.getElementById("status");

        const ws = new WebSocket("ws://127.0.0.1:8765");

        ws.onopen = () => {
            statusDiv.innerText = "Conectado ao Servidor!";
            statusDiv.style.color = "green";
        };

        ws.onmessage = (event) => {
            const state = JSON.parse(event.data);
            render(state);
        };

        ws.onerror = () => {
            statusDiv.innerText = "ERRO: Servidor não encontrado.";
            statusDiv.style.color = "red";
        };

        function render(state) {
            boardDiv.innerHTML = "";

            if (state.game_over) {
                statusDiv.innerText = "💥 Game Over! Reiniciando...";
                statusDiv.style.color = "red";
            } else if (state.last_player) {
                statusDiv.innerText = "Último jogador: " + state.last_player;
                statusDiv.style.color = "blue";
            }

            state.board.forEach((row, r) => {
                row.forEach((cell, c) => {
                    const btn = document.createElement("button");
                    btn.style.width = "45px";
                    btn.style.height = "45px";

                    if (state.revealed[r][c]) {
                        btn.innerText = cell === 1 ? "💣" : "✅";
                    } else if (state.game_over && cell === 1) {
                        btn.innerText = "💣";
                    } else {
                        btn.innerText = "?";
                    }

                    btn.onclick = () => {
                        ws.send(JSON.stringify({ r, c }));
                    };

                    boardDiv.appendChild(btn);
                });
            });
        }
    </script>
</body>
</html>
